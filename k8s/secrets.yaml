# DreamTeQ Vault Secrets
# IMPORTANT: Do NOT commit real values to Git.
# Use a secret manager (Azure Key Vault, AWS Secrets Manager, Sealed Secrets)
# to inject real base64-encoded values before applying to cluster.
#
# Encode a value: echo -n "YOUR_VALUE" | base64
#
# Apply: kubectl apply -f k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: dreamteq-vault-secrets
  namespace: dreamteq-erp
type: Opaque
data:
  # Replace with: echo -n "fc-YOUR_REAL_KEY" | base64
  FIRECRAWL_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY

  # Replace with: echo -n "AIzaSy..." | base64
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY

  # Replace with: echo -n "postgresql://user:pass@host:5432/db" | base64
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_CONNECTION_STRING

  # Replace with: echo -n "https://discord.com/api/webhooks/..." | base64
  DISCORD_WEBHOOK_URL: REPLACE_WITH_BASE64_ENCODED_WEBHOOK_URL

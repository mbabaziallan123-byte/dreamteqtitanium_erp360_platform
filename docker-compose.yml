services:
  # Master PostgreSQL Cluster Configuration
  dreamteq-db:
    image: postgres:16-alpine
    container_name: dreamteq_postgres_core
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dreamteq-mesh

  # Redis Cache Engine
  dreamteq-cache:
    image: redis:7-alpine
    container_name: dreamteq_redis_mesh
    ports:
      - "6379:6379"
    networks:
      - dreamteq-mesh

  # Portal Front Facing Gateway Engine
  web:
    image: nginx:1.27-alpine
    container_name: dreamteq_portal_gateway
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./100APPS.HTML:/usr/share/nginx/html/100APPS.HTML:ro
      - ./LMSENTREPRISE.HTML:/usr/share/nginx/html/LMSENTREPRISE.HTML:ro
    networks:
      - dreamteq-mesh

  # WebSocket Realtime Message Broker Node
  dreamteq-socket-broker:
    image: node:20-alpine
    container_name: dreamteq_websocket_server
    ports:
      - "8085:8085"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: sh -c "npm install ws ioredis nodemailer && node websocket_broadcast_server.js"
    environment:
      - WS_PORT=8085
      - REDIS_HOST=dreamteq-cache
      - REDIS_PORT=6379
      - DREAMTEQ_MAIL_HOST=${DREAMTEQ_MAIL_HOST}
      - DREAMTEQ_MAIL_PORT=${DREAMTEQ_MAIL_PORT}
      - DREAMTEQ_MAIL_USER=${DREAMTEQ_MAIL_USER}
      - DREAMTEQ_MAIL_PASSWORD=${DREAMTEQ_MAIL_PASSWORD}
      - DREAMTEQ_NOTIFY_LIST=${DREAMTEQ_NOTIFY_LIST}
      - DREAMTEQ_MAIL_DRY_RUN=${DREAMTEQ_MAIL_DRY_RUN}
    depends_on:
      - dreamteq-cache
    networks:
      - dreamteq-mesh

  # Odoo 18 Application Hub
  odoo18-core:
    image: odoo:18.0
    container_name: odoo18_titanium_backend
    depends_on:
      - dreamteq-db
    ports:
      - "8069:8069"
    environment:
      - HOST=dreamteq-db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - dreamteq-mesh

  # Odoo 18 Ledger JSON-RPC Translation Broker
  dreamteq-ledger-middleware:
    image: node:20-alpine
    container_name: dreamteq_ledger_broker
    ports:
      - "8090:8090"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: sh -c "npm install ioredis pdfkit && node odoo_rpc_middleware.js"
    environment:
      - ODOO_URL=http://odoo18-core:8069
      - ODOO_RPC_PASSWORD=${ODOO_RPC_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - REDIS_HOST=dreamteq-cache
      - REDIS_PORT=6379
      - LEDGER_PORT=8090
    depends_on:
      - dreamteq-cache
      - odoo18-core
    networks:
      - dreamteq-mesh

  # Re-Integrated Frappe / ERPNext Stack Core Component (v14 Cache Matcher)
  frappenext-core:
    image: frappe/erpnext:v14
    container_name: dreamteq_frappe_server
    depends_on:
      - dreamteq-db
      - dreamteq-cache
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=dreamteq-db
      - REDIS_CACHE=redis://dreamteq-cache:6379/0
    networks:
      - dreamteq-mesh

  # WhatsApp Meta-Llama & Monica AI Router Gateway
  dreamteq-whatsapp-ai-router:
    image: node:20-alpine
    container_name: dreamteq_whatsapp_ai_broker
    ports:
      - "8095:8095"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: sh -c "npm install ioredis && node whatsapp_ai_router.js"
    environment:
      - WHATSAPP_AI_GATEWAY_TOKEN=${WHATSAPP_AI_GATEWAY_TOKEN}
      - WHATSAPP_ADMIN_PHONE=${WHATSAPP_ADMIN_PHONE}
      - MONICA_INVITATION_CODE=${MONICA_INVITATION_CODE}
      - ADMIN_CONTACT_EMAIL=${ADMIN_CONTACT_EMAIL}
      - REDIS_HOST=dreamteq-cache
      - REDIS_PORT=6379
    depends_on:
      - dreamteq-cache
    networks:
      - dreamteq-mesh

  # Firecrawl Live Web Intelligence Engine
  # Provides Amanda Swarm with KYC, price discovery, and market research skills
  dreamteq-firecrawl-worker:
    image: node:20-alpine
    container_name: dreamteq_firecrawl_worker
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: node -e "console.log('[CONTAINER HYDRATION] Firecrawl AI Agent Skill Node running in production background mesh. Ready.')"
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    networks:
      - dreamteq-mesh

volumes:
  postgres_master_data:

networks:
  dreamteq-mesh:
    driver: bridge